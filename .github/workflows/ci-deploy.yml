name: CI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linter
        run: pip install ruff

      - name: Lint with Ruff
        run: ruff check . --select E,F,I,W --ignore E501 || true

  deploy:
    name: Deploy to VPS
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          script: |
            export DISCORD_DEPLOY_WEBHOOK="${{ secrets.DISCORD_DEPLOY_WEBHOOK }}"
            /home/mumega/scripts/deploy.sh mirror main

      - name: Notify failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          script: |
            export DISCORD_DEPLOY_WEBHOOK="${{ secrets.DISCORD_DEPLOY_WEBHOOK }}"
            curl -sf -H "Content-Type: application/json" -d '{"embeds":[{"title":"Deploy: mirror (FAILED)","description":"GitHub Actions deploy step failed","color":15158332}]}' "$DISCORD_DEPLOY_WEBHOOK" || true
